<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Transcribe — Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --bg-elev: #18181b;
    --bg-card: #1c1c20;
    --border: #27272a;
    --border-strong: #3f3f46;
    --text: #fafafa;
    --text-muted: #a1a1aa;
    --text-faint: #71717a;
    --accent: #f59e0b;
    --accent-dim: #fbbf2422;
    --success: #22c55e;
    --error: #ef4444;
    --warning: #eab308;
    --radius: 6px;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Layout ─────────────────────────── */
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  h1 {
    font-size: 20px; font-weight: 600; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 10px;
  }
  h1::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
  }
  .status-pill {
    font-size: 12px; color: var(--text-muted);
    font-family: var(--font-mono); padding: 4px 10px;
    border: 1px solid var(--border); border-radius: 999px;
  }
  .status-pill.ok { color: var(--success); border-color: #22c55e44; }
  .status-pill.err { color: var(--error); border-color: #ef444444; }

  /* ── Card ─────────────────────────── */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    margin-bottom: 16px;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .card-action {
    font-size: 12px; color: var(--text-faint); cursor: pointer;
    user-select: none; padding: 2px 6px;
  }
  .card-action:hover { color: var(--text); }

  /* ── Form ─────────────────────────── */
  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .form-grid.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 11px; color: var(--text-muted);
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em;
  }
  input, textarea, select {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 10px; color: var(--text);
    font-family: var(--font-mono); font-size: 13px;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent);
    background: var(--bg);
  }
  textarea { resize: vertical; min-height: 100px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; }
  .checkbox-row label { text-transform: none; letter-spacing: 0; color: var(--text); font-size: 13px; }

  /* ── Button ─────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #000;
    border: none; padding: 9px 16px; border-radius: 4px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s, transform 0.05s;
    font-family: var(--font-sans);
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: transparent; color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { background: var(--bg-elev); opacity: 1; }
  .btn-small { padding: 4px 10px; font-size: 12px; font-weight: 500; }

  /* ── Result Items ─────────────────────────── */
  .item {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px;
    overflow: hidden;
  }
  .item-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px; background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  .item-header.no-bottom { border-bottom: none; }
  .item-meta { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .item-idx {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-faint); min-width: 28px;
  }
  .item-title {
    font-size: 13px; font-weight: 500; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
  }
  .item-url {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .badge {
    padding: 2px 8px; border-radius: 999px; font-size: 11px;
    font-family: var(--font-mono); font-weight: 500; flex-shrink: 0;
  }
  .badge.pending { background: #71717a22; color: var(--text-faint); }
  .badge.running { background: var(--accent-dim); color: var(--accent); }
  .badge.done { background: #22c55e22; color: var(--success); }
  .badge.failed { background: #ef444422; color: var(--error); }
  .elapsed { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }

  .item-body { padding: 0; display: none; }
  .item-body.open { display: block; }
  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    padding: 0 18px;
  }
  .tab {
    padding: 10px 14px; cursor: pointer; font-size: 12px;
    color: var(--text-muted); border-bottom: 2px solid transparent;
    margin-bottom: -1px; user-select: none;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { padding: 16px 18px; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
  .text-block {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 14px;
    font-family: var(--font-mono); font-size: 12.5px;
    white-space: pre-wrap; word-wrap: break-word; max-height: 500px;
    overflow-y: auto; line-height: 1.7;
  }
  .log-block {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 10px 12px; font-family: var(--font-mono); font-size: 11.5px;
    max-height: 240px; overflow-y: auto; color: var(--text-muted);
  }
  .log-line { padding: 1px 0; }
  .copy-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .copy-row .small-label { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); }

  .error-msg {
    background: #ef444411; border: 1px solid #ef444444;
    color: #fca5a5; padding: 12px 16px; border-radius: 4px;
    font-family: var(--font-mono); font-size: 12px;
    white-space: pre-wrap;
  }

  /* ── Modal (auth prompt) ─────────────────────────── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 24px;
    width: 360px; max-width: 90vw;
  }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .hidden { display: none !important; }

  /* ── Toast ─────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg-card); border: 1px solid var(--border-strong);
    color: var(--text); padding: 10px 16px; border-radius: 4px;
    font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 999; opacity: 0; transition: opacity 0.2s, transform 0.2s;
    transform: translateY(8px);
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* responsive */
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .container { padding: 20px 14px 60px; }
    h1 { font-size: 17px; }
  }
</style>
</head>
<body>

<div id="auth-modal" class="modal-bg hidden">
  <div class="modal">
    <h2>访问密码</h2>
    <p style="color: var(--text-muted); margin-bottom: 16px; font-size: 13px;">
      该实例需要密码访问。输入后保存在本机 localStorage。
    </p>
    <input type="password" id="auth-input" placeholder="password" autocomplete="off" />
    <div style="display:flex; justify-content:flex-end; margin-top: 16px;">
      <button class="btn" onclick="submitAuth()">确定</button>
    </div>
  </div>
</div>

<div class="container">
  <header>
    <h1>Video Transcribe</h1>
    <div id="status-pill" class="status-pill">connecting…</div>
  </header>

  <!-- 输入 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">视频链接</div>
      <div style="display:flex; gap: 10px; align-items: center;">
        <div class="checkbox-row" style="margin-right: 4px;">
          <input type="checkbox" id="do-polish" checked />
          <label for="do-polish" style="font-size: 12px; color: var(--text-muted);">LLM 校对</label>
        </div>
        <select id="lang" style="width: auto; padding: 5px 10px; font-size: 12px;">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
        </select>
        <button class="btn" id="submit-btn" onclick="startTranscribe()">开始转录</button>
      </div>
    </div>
    <div class="form-grid full">
      <div class="field">
        <textarea id="urls" placeholder="一行一个 URL，支持 B站 / YouTube / TikTok 等&#10;https://www.bilibili.com/video/BV...&#10;https://www.youtube.com/watch?v=..."></textarea>
        <div style="font-size: 11px; color: var(--text-faint); margin-top: 4px; font-family: var(--font-mono);">
          最多 12 路并发，默认 6 路（服务端限制）
        </div>
      </div>
    </div>
  </div>

  <!-- 任务列表 -->
  <div id="jobs"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = window.location.origin;
let AUTH_TOKEN = localStorage.getItem('vt_token') || '';
const POLL_INTERVAL = 1500;
const activeJobs = new Map();  // job_id -> {pollHandle, items}

function toast(msg, ms = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), ms);
}

function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (AUTH_TOKEN) headers['X-Auth-Token'] = AUTH_TOKEN;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API + path, opts).then(async r => {
    if (r.status === 401) {
      AUTH_TOKEN = '';
      localStorage.removeItem('vt_token');
      showAuthModal();
      throw new Error('需要密码');
    }
    if (!r.ok) {
      const t = await r.text();
      throw new Error(`${r.status}: ${t}`);
    }
    return r.json();
  });
}

function showAuthModal() {
  document.getElementById('auth-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('auth-input').focus(), 50);
}

function submitAuth() {
  const t = document.getElementById('auth-input').value.trim();
  if (!t) return;
  AUTH_TOKEN = t;
  localStorage.setItem('vt_token', t);
  document.getElementById('auth-modal').classList.add('hidden');
  refreshHealth();
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('auth-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAuth();
  });
});

function toggleCard(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

// 持久化用户偏好（只剩 lang + polish toggle）
function loadConfig() {
  const cfg = JSON.parse(localStorage.getItem('vt_cfg') || '{}');
  document.getElementById('do-polish').checked = cfg.do_polish !== false;
  document.getElementById('lang').value = cfg.lang ?? 'zh';
}
function saveConfig() {
  localStorage.setItem('vt_cfg', JSON.stringify({
    do_polish: document.getElementById('do-polish').checked,
    lang: document.getElementById('lang').value,
  }));
}
['do-polish','lang'].forEach(id =>
  document.addEventListener('DOMContentLoaded', () =>
    document.getElementById(id).addEventListener('change', saveConfig)));

async function refreshHealth() {
  const pill = document.getElementById('status-pill');
  try {
    const h = await api('GET', '/api/health');
    pill.className = 'status-pill ok';
    const llmTag = h.llm_configured ? `llm:${h.llm_model}` : 'llm:✗';
    pill.textContent = `groq:${h.groq_keys} ${llmTag} jobs:${h.jobs_in_memory}`;
  } catch (e) {
    pill.className = 'status-pill err';
    pill.textContent = e.message.substring(0, 30);
  }
}

async function startTranscribe() {
  const urlsRaw = document.getElementById('urls').value;
  const urls = urlsRaw.split('\n').map(x => x.trim()).filter(Boolean);
  if (!urls.length) { toast('先粘 URL'); return; }
  saveConfig();
  const body = {
    urls, lang: document.getElementById('lang').value,
    do_polish: document.getElementById('do-polish').checked,
  };
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '提交中...';
  try {
    const res = await api('POST', '/api/transcribe', body);
    toast(`已提交 ${res.count} 条`);
    document.getElementById('urls').value = '';
    pollJob(res.job_id);
  } catch (e) {
    toast(`失败: ${e.message}`, 4000);
  } finally {
    btn.disabled = false; btn.textContent = '开始转录';
  }
}

function pollJob(jobId) {
  const tick = async () => {
    try {
      const job = await api('GET', `/api/jobs/${jobId}`);
      renderJob(job);
      if (job.status === 'done') {
        clearInterval(handle);
        activeJobs.delete(jobId);
        refreshHealth();
      }
    } catch (e) {
      console.error(e);
    }
  };
  const handle = setInterval(tick, POLL_INTERVAL);
  activeJobs.set(jobId, { handle });
  tick();
}

function renderJob(job) {
  let el = document.getElementById('job-' + job.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'job-' + job.id;
    el.className = 'card';
    document.getElementById('jobs').prepend(el);
  }
  const ts = new Date(job.created_at * 1000).toLocaleTimeString();
  const doneCount = job.items.filter(i => i.status === 'done').length;
  const failCount = job.items.filter(i => i.status === 'failed').length;
  const total = job.items.length;
  el.innerHTML = `
    <div class="card-header">
      <div class="card-title">Job <span style="font-family: var(--font-mono); text-transform: none;">${job.id}</span> · ${ts}</div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="elapsed">${doneCount}/${total} done · ${failCount} fail</span>
        <button class="btn btn-secondary btn-small" onclick="deleteJob('${job.id}')">×</button>
      </div>
    </div>
    <div>${job.items.map(it => renderItem(job.id, it)).join('')}</div>
  `;
}

function renderItem(jobId, it) {
  const elapsed = it.elapsed ? `${it.elapsed.toFixed(1)}s` : '';
  const titleOrUrl = it.title || it.url;
  const subUrl = it.title ? `<div class="item-url">${escapeHTML(it.url)}</div>` : '';
  const bodyKey = `body-${jobId}-${it.idx}`;
  const openClass = it.status === 'done' || it.status === 'failed' ? 'open' : '';
  let body = '';
  if (it.status === 'done') {
    body = `
      <div class="tabs">
        <div class="tab ${it.polished && it.polished !== it.raw ? 'active' : ''}" onclick="switchTab(this, '${bodyKey}-polished')">校对后</div>
        <div class="tab ${!(it.polished && it.polished !== it.raw) ? 'active' : ''}" onclick="switchTab(this, '${bodyKey}-raw')">原始</div>
        <div class="tab" onclick="switchTab(this, '${bodyKey}-log')">日志</div>
      </div>
      <div class="tab-content">
        <div id="${bodyKey}-polished" class="tab-pane ${it.polished && it.polished !== it.raw ? 'active' : ''}">
          <div class="copy-row"><span class="small-label">${(it.polished || '').length} chars</span><button class="btn btn-secondary btn-small" onclick="copyText(this, ${JSON.stringify(it.polished || '').replace(/'/g, '&apos;')})">复制</button></div>
          <div class="text-block">${escapeHTML(it.polished || '')}</div>
        </div>
        <div id="${bodyKey}-raw" class="tab-pane ${!(it.polished && it.polished !== it.raw) ? 'active' : ''}">
          <div class="copy-row"><span class="small-label">${(it.raw || '').length} chars</span><button class="btn btn-secondary btn-small" onclick="copyText(this, ${JSON.stringify(it.raw || '').replace(/'/g, '&apos;')})">复制</button></div>
          <div class="text-block">${escapeHTML(it.raw || '')}</div>
        </div>
        <div id="${bodyKey}-log" class="tab-pane">
          <div class="log-block">${(it.logs || []).map(l => `<div class="log-line">${escapeHTML(l)}</div>`).join('')}</div>
        </div>
      </div>
    `;
  } else if (it.status === 'failed') {
    body = `
      <div class="tab-content">
        <div class="error-msg">${escapeHTML(it.error || 'unknown error')}</div>
        ${it.logs && it.logs.length ? `<div style="margin-top: 12px;"><div class="small-label" style="margin-bottom: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);">最后日志</div><div class="log-block">${it.logs.slice(-20).map(l => `<div class="log-line">${escapeHTML(l)}</div>`).join('')}</div></div>` : ''}
      </div>
    `;
  } else if (it.status === 'running') {
    body = `
      <div class="tab-content">
        <div class="log-block">${(it.logs || []).slice(-10).map(l => `<div class="log-line">${escapeHTML(l)}</div>`).join('') || '<div style="color: var(--text-faint);">starting...</div>'}</div>
      </div>
    `;
  }
  return `
    <div class="item">
      <div class="item-header ${body ? '' : 'no-bottom'}" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="item-meta">
          <span class="item-idx">#${it.idx + 1}</span>
          <div style="min-width:0; flex:1;">
            <div class="item-title">${escapeHTML(titleOrUrl)}</div>
            ${subUrl}
          </div>
        </div>
        <span class="elapsed">${elapsed}</span>
        <span class="badge ${it.status}">${it.status}</span>
      </div>
      <div class="item-body ${openClass}">${body}</div>
    </div>
  `;
}

function switchTab(tabEl, paneId) {
  const tabs = tabEl.parentElement.children;
  for (const t of tabs) t.classList.remove('active');
  tabEl.classList.add('active');
  const content = tabEl.parentElement.nextElementSibling;
  for (const p of content.children) p.classList.remove('active');
  document.getElementById(paneId).classList.add('active');
}

async function copyText(btn, text) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = orig, 1500);
  } catch (e) {
    toast('复制失败: ' + e.message);
  }
}

async function deleteJob(jobId) {
  if (!confirm('删除这个任务记录？')) return;
  await api('DELETE', `/api/jobs/${jobId}`);
  const el = document.getElementById('job-' + jobId);
  if (el) el.remove();
  const ah = activeJobs.get(jobId);
  if (ah) { clearInterval(ah.handle); activeJobs.delete(jobId); }
}

function escapeHTML(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// 启动
document.addEventListener('DOMContentLoaded', () => {
  loadConfig();
  refreshHealth();
});
</script>
</body>
</html>
